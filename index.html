<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Study with 둥둥</title>
  <meta property="og:title" content="📚 Study with 둥둥">
  <meta property="og:description" content="Mon–Fri Zoom Study Attendance">
  <style>
    :root {--bg:#f2f0eb;--card:#fff;--primary:#5c67f2;--primary-light:#eef0fe;--success:#22c55e;--success-light:#dcfce7;--streak:#f97316;--streak-light:#fff4ed;--text:#1a1a2e;--text-muted:#6b7280;--border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 16px 60px;}
    .container{max-width:860px;margin:0 auto;}
    .header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;}
    .header h1{font-size:22px;font-weight:800;letter-spacing:-.5px;}
    .header .sub{font-size:13px;color:var(--text-muted);margin-top:4px;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
    .stat-card{background:var(--card);border-radius:18px;padding:14px 10px 12px;box-shadow:var(--shadow);text-align:center;}
    .stat-card .icon{font-size:22px;margin-bottom:4px;}
    .stat-card .value{font-size:26px;font-weight:900;line-height:1;margin-bottom:3px;}
    .stat-card .label{font-size:10px;color:var(--text-muted);font-weight:600;}
    .stat-card.streak-card{background:var(--streak-light);} .stat-card.streak-card .value{color:var(--streak);}
    .stat-card.total-card{background:var(--primary-light);} .stat-card.total-card .value{color:var(--primary);}
    .stat-card.rate-card{background:var(--success-light);} .stat-card.rate-card .value{color:var(--success);}
    .card{background:var(--card);border-radius:18px;padding:20px 22px;box-shadow:var(--shadow);margin-bottom:20px;}
    .card-title{font-size:14px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;}
    .week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
    .day-cell{border-radius:12px;padding:14px 6px 12px;text-align:center;cursor:pointer;border:2px solid var(--border);background:#fafafa;transition:all .18s;user-select:none;position:relative;}
    .day-cell.attended{background:var(--success);border-color:var(--success);color:white;}
    .day-cell.today-cell:not(.attended){border-color:var(--primary);background:var(--primary-light);}
    .day-cell.future-day{opacity:.35;cursor:default;}
    .day-cell.selected{background:#dcfce7;border-color:#86efac;}
    .day-cell.attended.selected{background:#4ade80;border-color:#4ade80;}
    .day-name{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:6px;opacity:.65;}
    .week-dot{width:6px;height:6px;background:#fbbf24;border-radius:50%;margin:6px auto 0;}
    .day-num{font-size:20px;font-weight:800;margin-bottom:4px;}
    .today-badge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--primary);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;white-space:nowrap;}
    .photo-drawer{overflow:hidden;max-height:0;transition:max-height .35s ease,margin-top .3s ease;margin-top:0;}
    .photo-drawer.open{max-height:800px;margin-top:16px;}
    .photo-drawer-inner{background:#f9fafb;border-radius:14px;padding:14px;border:1px solid var(--border);}
    .drawer-label{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:10px;}
    .drawer-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
    .photo-thumb{border-radius:10px;overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow);cursor:pointer;transition:transform .18s;background:#e5e7eb;}
    .photo-thumb:hover{transform:scale(1.04);}
    .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .drawer-empty{font-size:13px;color:var(--text-muted);padding:8px 0;}
    .cal-nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:14px;}
    .cal-nav-center{display:flex;align-items:center;justify-content:center;gap:2px;}
    .cal-nav-right{display:flex;justify-content:flex-end;}
    .cal-nav-btn{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);padding:4px 8px;border-radius:8px;transition:background .15s;}
    .cal-nav-btn:hover{background:#f3f4f6;color:var(--text);}
    .cal-nav-title{font-size:15px;font-weight:800;padding:0 4px;}
    .cal-today-btn{background:var(--primary-light);border:none;cursor:pointer;font-size:11px;font-weight:700;color:var(--primary);padding:4px 10px;border-radius:20px;transition:background .15s;}
    .cal-today-btn:hover{background:#dde0fc;}
    .cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
    .cal-header-cell{text-align:center;font-size:11px;font-weight:700;color:var(--text-muted);padding:4px 0;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-day{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;min-height:44px;}
    .cal-day:hover:not(.cal-empty):not(.cal-weekend):not(.cal-attended){background:#f3f4f6;}
    .cal-day.cal-attended{background:var(--success);color:white;font-weight:800;}
    .cal-day.cal-today{outline:2.5px solid var(--primary);outline-offset:1px;}
    .cal-day.cal-selected{background:#dcfce7;} .cal-day.cal-attended.cal-selected{background:#4ade80;color:white;}
    .cal-day.cal-empty{cursor:default;pointer-events:none;}
    .cal-day.cal-weekend{color:#d1d5db;cursor:default;}
    .cal-day.cal-holiday{color:#ef4444;font-weight:700;}
    .cal-day.cal-attended.cal-holiday{color:white;}
    .cal-drawer{grid-column:1/-1;overflow:hidden;max-height:0;transition:max-height .35s ease;}
    .cal-drawer.open{max-height:800px;}
    .cal-drawer-inner{background:#f9fafb;border-radius:12px;padding:14px;border:1px solid var(--border);margin-top:6px;margin-bottom:4px;}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;}
    .lb-close{position:absolute;top:18px;right:22px;color:white;font-size:36px;cursor:pointer;background:none;border:none;opacity:.8;line-height:1;z-index:2;}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;font-size:36px;width:52px;height:52px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
    .lb-prev{left:20px;} .lb-next{right:20px;}
    .lb-counter{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:white;font-size:13px;font-weight:600;opacity:.7;background:rgba(0,0,0,.3);padding:4px 12px;border-radius:20px;}
    .updated-at{font-size:11px;color:var(--text-muted);text-align:right;margin-bottom:16px;}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div><h1>📚 Study with 둥둥</h1><div class="sub">Mon–Fri Zoom Study Attendance</div></div>
  </div>
  <div class="stats-row">
    <div class="stat-card streak-card"><div class="icon">🔥</div><div class="value" id="streak-val">0</div><div class="label">Day Streak</div></div>
    <div class="stat-card total-card"><div class="icon">📅</div><div class="value" id="total-val">0</div><div class="label">Total Days</div></div>
    <div class="stat-card rate-card"><div class="icon">💯</div><div class="value" id="rate-val">0%</div><div class="label">Monthly Rate</div></div>
  </div>
  <div class="card">
    <div class="card-title">This Week</div>
    <div class="week-grid" id="week-grid"></div>
    <div class="photo-drawer" id="week-photo-drawer">
      <div class="photo-drawer-inner">
        <div class="drawer-label" id="drawer-label">📸 Photos</div>
        <div class="drawer-photos" id="drawer-photos"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="cal-nav">
      <div></div>
      <div class="cal-nav-center">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-nav-title" id="month-label">Monthly Calendar</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-nav-right">
        <button class="cal-today-btn" onclick="goToToday()">Today</button>
      </div>
    </div>
    <div class="cal-header-row">
      <div class="cal-header-cell">Sun</div><div class="cal-header-cell">Mon</div>
      <div class="cal-header-cell">Tue</div><div class="cal-header-cell">Wed</div>
      <div class="cal-header-cell">Thu</div><div class="cal-header-cell">Fri</div>
      <div class="cal-header-cell">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="updated-at">Updated: 2026-04-22 10:05</div>
</div>
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">×</button>
  <button class="lb-nav lb-prev" id="lb-prev" onclick="lightboxNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="photo" style="user-select:none;">
  <button class="lb-nav lb-next" id="lb-next" onclick="lightboxNav(1)">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>
<script>
const PHOTOS=[{"date": "2026-04-13", "src": "photos/2026-04-13_1.jpg"}, {"date": "2026-04-13", "src": "photos/2026-04-13_2.jpg"}, {"date": "2026-04-13", "src": "photos/2026-04-13_3.jpg"}, {"date": "2026-04-14", "src": "photos/2026-04-14_1.jpg"}, {"date": "2026-04-14", "src": "photos/2026-04-14_2.jpg"}, {"date": "2026-04-14", "src": "photos/2026-04-14_3.jpg"}, {"date": "2026-04-15", "src": "photos/2026-04-15_1.jpg"}, {"date": "2026-04-15", "src": "photos/2026-04-15_2.jpg"}, {"date": "2026-04-15", "src": "photos/2026-04-15_3.jpg"}, {"date": "2026-04-16", "src": "photos/2026-04-16_1.jpg"}, {"date": "2026-04-16", "src": "photos/2026-04-16_2.jpg"}, {"date": "2026-04-16", "src": "photos/2026-04-16_3.jpg"}, {"date": "2026-04-17", "src": "photos/2026-04-17_1.jpg"}, {"date": "2026-04-17", "src": "photos/2026-04-17_2.jpg"}, {"date": "2026-04-17", "src": "photos/2026-04-17_3.jpg"}, {"date": "2026-04-20", "src": "photos/2026-04-20_1.jpg"}, {"date": "2026-04-20", "src": "photos/2026-04-20_2.jpg"}, {"date": "2026-04-20", "src": "photos/2026-04-20_3.jpg"}, {"date": "2026-04-21", "src": "photos/2026-04-21_1.jpg"}, {"date": "2026-04-21", "src": "photos/2026-04-21_2.jpg"}, {"date": "2026-04-21", "src": "photos/2026-04-21_3.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_1.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_2.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_3.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_4.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_5.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_6.jpg"}, {"date": "2026-04-22", "src": "photos/2026-04-22_7.jpg"}];
const attendance=new Set(PHOTOS.map(p=>p.date));
const photosByDate={};
PHOTOS.forEach(p=>{if(!photosByDate[p.date])photosByDate[p.date]=[];photosByDate[p.date].push(p.src);});
function toDateStr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function isWeekday(d){const day=d.getDay();return day>=1&&day<=5;}
function getWeekdaysInMonth(y,m){const days=[],d=new Date(y,m,1);while(d.getMonth()===m){if(isWeekday(d))days.push(toDateStr(new Date(d)));d.setDate(d.getDate()+1);}return days;}
function calcStreak(){const today=new Date();today.setHours(0,0,0,0);let streak=0,d=new Date(today);while(!isWeekday(d))d.setDate(d.getDate()-1);while(true){const ds=toDateStr(d);if(attendance.has(ds)){streak++;d.setDate(d.getDate()-1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()-1);}else break;if(streak>365)break;}return streak;}
const koMonth=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],koWeek=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function friendlyDate(ds){const d=new Date(ds+"T00:00:00");return koMonth[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear()+" ("+koWeek[d.getDay()]+")"}
let selectedDate=null,calSelectedDate=null;
const HOLIDAYS=new Set(["2025-01-01","2026-01-01","2027-01-01","2025-01-28","2025-01-29","2025-01-30","2026-02-16","2026-02-17","2026-02-18","2027-02-06","2027-02-07","2027-02-08","2025-03-01","2026-03-01","2027-03-01","2025-05-05","2026-05-05","2027-05-05","2026-05-24","2027-05-13","2025-06-06","2026-06-06","2027-06-06","2025-08-15","2026-08-15","2027-08-15","2025-10-05","2025-10-06","2025-10-07","2026-09-24","2026-09-25","2026-09-26","2027-10-14","2027-10-15","2027-10-16","2025-10-03","2026-10-03","2027-10-03","2025-10-09","2026-10-09","2027-10-09","2025-12-25","2026-12-25","2027-12-25"]);
let displayYear,displayMonth;
function showWeekDrawer(ds){const drawer=document.getElementById("week-photo-drawer"),label=document.getElementById("drawer-label"),grid=document.getElementById("drawer-photos");if(selectedDate===ds){selectedDate=null;drawer.classList.remove("open");renderWeek(new Date(),toDateStr(new Date()));return;}selectedDate=ds;const photos=photosByDate[ds]||[];label.textContent="📸 "+friendlyDate(ds);grid.innerHTML="";if(photos.length===0){grid.innerHTML='<div class="drawer-empty">No photos yet</div>';}else{photos.forEach((src,i)=>{const t=document.createElement("div");t.className="photo-thumb";const img=document.createElement("img");img.src=src;img.alt="photo";t.appendChild(img);img.addEventListener("click",e=>{e.stopPropagation();openLightbox(photos,i);});grid.appendChild(t);});}drawer.classList.add("open");renderWeek(new Date(),toDateStr(new Date()));}
function renderWeek(now,todayStr){const grid=document.getElementById("week-grid");grid.innerHTML="";const dow=now.getDay(),monday=new Date(now);monday.setHours(0,0,0,0);monday.setDate(now.getDate()-(dow===0?6:dow-1));const labels=["MON","TUE","WED","THU","FRI"];for(let i=0;i<5;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);const ds=toDateStr(d);const isToday=ds===todayStr,isFuture=d>now,isAttend=attendance.has(ds),isSelected=ds===selectedDate;const cell=document.createElement("div");cell.className="day-cell"+(isAttend?" attended":"")+(isToday?" today-cell":"")+(isFuture?" future-day":"")+(isSelected?" selected":"");if(isToday){const b=document.createElement("div");b.className="today-badge";b.textContent="Today";cell.appendChild(b);}cell.innerHTML+='<div class="day-name">'+labels[i]+'</div><div class="day-num">'+d.getDate()+'</div>'+(isAttend?'<div class="week-dot"></div>':'');if(!isFuture)cell.addEventListener("click",()=>{showWeekDrawer(ds);});grid.appendChild(cell);}}
function renderMonth(now,todayStr){const y=displayYear,m=displayMonth;document.getElementById("month-label").textContent=koMonth[m]+" "+y;const grid=document.getElementById("cal-grid");grid.innerHTML="";const firstDay=new Date(y,m,1).getDay(),lastDate=new Date(y,m+1,0).getDate();for(let i=0;i<firstDay;i++){const el=document.createElement("div");el.className="cal-day cal-empty";grid.appendChild(el);}for(let day=1;day<=lastDate;day++){const date=new Date(y,m,day),ds=toDateStr(date),dow=date.getDay();const isWeekend=dow===0||dow===6,isToday=ds===todayStr,isAttend=attendance.has(ds),isSelected=ds===calSelectedDate,isHoliday=!isWeekend&&HOLIDAYS.has(ds);const el=document.createElement("div");el.className="cal-day"+(isWeekend?" cal-weekend":"")+(isAttend?" cal-attended":"")+(isToday?" cal-today":"")+(isSelected?" cal-selected":"")+(isHoliday?" cal-holiday":"");el.innerHTML=day;if(!isWeekend)el.addEventListener("click",()=>{openCalDrawer(ds,grid,firstDay,lastDate,day,y,m,now,todayStr);});grid.appendChild(el);}}
function changeMonth(dir){displayMonth+=dir;if(displayMonth>11){displayMonth=0;displayYear++;}if(displayMonth<0){displayMonth=11;displayYear--;}calSelectedDate=null;document.querySelectorAll(".cal-drawer").forEach(el=>el.remove());const now=new Date(),todayStr=toDateStr(now);renderMonth(now,todayStr);}
function goToToday(){const now=new Date();displayYear=now.getFullYear();displayMonth=now.getMonth();calSelectedDate=null;document.querySelectorAll(".cal-drawer").forEach(el=>el.remove());renderMonth(now,toDateStr(now));}
function openCalDrawer(ds,grid,firstDay,lastDate,clickedDay,y,m,now,todayStr){document.querySelectorAll(".cal-drawer").forEach(el=>el.remove());if(calSelectedDate===ds){calSelectedDate=null;renderMonth(now,todayStr);return;}calSelectedDate=ds;renderMonth(now,todayStr);const photos=photosByDate[ds]||[];const cellIndex=firstDay+clickedDay-1,rowEnd=Math.floor(cellIndex/7)*7+6;const cells=grid.children,insertAfter=cells[Math.min(rowEnd,cells.length-1)];const drawer=document.createElement("div");drawer.className="cal-drawer";const inner=document.createElement("div");inner.className="cal-drawer-inner";inner.innerHTML='<div class="drawer-label">📸 '+friendlyDate(ds)+'</div>';const pg=document.createElement("div");pg.className="drawer-photos";if(photos.length===0){pg.innerHTML='<div class="drawer-empty">No photos yet</div>';}else{photos.forEach((src,i)=>{const t=document.createElement("div");t.className="photo-thumb";const img=document.createElement("img");img.src=src;img.alt="photo";img.addEventListener("click",e=>{e.stopPropagation();openLightbox(photos,i);});t.appendChild(img);pg.appendChild(t);});}inner.appendChild(pg);drawer.appendChild(inner);if(insertAfter&&insertAfter.nextSibling)grid.insertBefore(drawer,insertAfter.nextSibling);else grid.appendChild(drawer);requestAnimationFrame(()=>drawer.classList.add("open"));}
function renderStats(){const now=new Date(),todayStr=toDateStr(now);document.getElementById("streak-val").textContent=calcStreak();document.getElementById("total-val").textContent=attendance.size;const weekdays=getWeekdaysInMonth(now.getFullYear(),now.getMonth());const passed=weekdays.filter(ds=>ds<=todayStr),attended=passed.filter(ds=>attendance.has(ds)).length;document.getElementById("rate-val").textContent=(passed.length>0?Math.round((attended/passed.length)*100):0)+"%";}
let lbPhotos=[],lbIdx=0;
function updateLb(){document.getElementById("lb-img").src=lbPhotos[lbIdx];document.getElementById("lb-counter").textContent=(lbIdx+1)+" / "+lbPhotos.length;document.getElementById("lb-prev").style.display=lbPhotos.length>1?"flex":"none";document.getElementById("lb-next").style.display=lbPhotos.length>1?"flex":"none";}
function openLightbox(photos,idx){lbPhotos=photos;lbIdx=idx;updateLb();document.getElementById("lightbox").classList.add("open");document.body.style.overflow="hidden";}
function lightboxNav(dir){lbIdx=(lbIdx+dir+lbPhotos.length)%lbPhotos.length;updateLb();}
function closeLightbox(){document.getElementById("lightbox").classList.remove("open");document.body.style.overflow="";}
document.addEventListener("keydown",e=>{const lb=document.getElementById("lightbox");if(!lb.classList.contains("open"))return;if(e.key==="Escape")closeLightbox();else if(e.key==="ArrowRight")lightboxNav(1);else if(e.key==="ArrowLeft")lightboxNav(-1);});
(function(){let tx=0,startDist=0,scale=1,baseScale=1,lastTap=0;const lb=document.getElementById("lightbox"),img=document.getElementById("lb-img");function getDist(t){const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}function resetZoom(){scale=1;baseScale=1;img.style.transform="scale(1)";}lb.addEventListener("touchstart",e=>{if(e.touches.length===1)tx=e.touches[0].clientX;if(e.touches.length===2){startDist=getDist(e.touches);baseScale=scale;}},{passive:true});lb.addEventListener("touchmove",e=>{e.preventDefault();if(e.touches.length===2){const s=Math.min(Math.max(baseScale*(getDist(e.touches)/startDist),1),4);scale=s;img.style.transform="scale("+s+")";}},{passive:false});lb.addEventListener("touchend",e=>{const now=Date.now();if(now-lastTap<300){resetZoom();}lastTap=now;if(scale===1&&e.changedTouches.length===1){const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)lightboxNav(dx<0?1:-1);}},{passive:true});lb.addEventListener("click",e=>{if(e.target===lb)closeLightbox();});})();
function init(){const now=new Date(),todayStr=toDateStr(now);displayYear=now.getFullYear();displayMonth=now.getMonth();renderStats();renderWeek(now,todayStr);renderMonth(now,todayStr);}
init();
</script>
</body>
</html>
